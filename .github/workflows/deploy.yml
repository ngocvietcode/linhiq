# ══════════════════════════════════════════════════════
# LinhIQ — CI/CD Pipeline
# ══════════════════════════════════════════════════════
# Triggers:
#   - Push to main → Build, Test, Deploy to production
#   - Pull Request  → Build & Test only
# ══════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.7.1'

jobs:
  # ════════════════════════════════════
  # Job 1: Lint & Type Check
  # ════════════════════════════════════
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @linhiq/database db:generate

      - name: Lint
        run: pnpm lint

  # ════════════════════════════════════
  # Job 2: Build & Test
  # ════════════════════════════════════
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @linhiq/database db:generate

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm --filter api test || true

  # ════════════════════════════════════
  # Job 3: Build Docker Images
  # ════════════════════════════════════
  docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: linhiq-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: linhiq-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ════════════════════════════════════
  # Job 4: Deploy to Production VPS
  # ════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "═══════════════════════════════════════"
            echo "🚀 Deploying Javirs — $(date)"
            echo "═══════════════════════════════════════"

            cd ~/linhiq

            # Pull latest code
            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Build and deploy with Docker Compose
            echo "🐳 Building Docker images..."
            docker compose -f docker-compose.prod.yml build --no-cache

            # Run database migrations
            echo "🗄️ Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm api \
              npx prisma migrate deploy --schema=./packages/database/prisma/schema.prisma

            # Restart services (rolling update)
            echo "♻️ Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup old images
            echo "🧹 Cleaning up..."
            docker image prune -f

            # Health check
            echo "🏥 Running health check..."
            sleep 10
            curl -sf http://localhost:4500/api || echo "⚠️ API health check failed"
            curl -sf http://localhost:3000 || echo "⚠️ Web health check failed"

            echo "═══════════════════════════════════════"
            echo "✅ Deployment complete!"
            echo "═══════════════════════════════════════"
            docker compose -f docker-compose.prod.yml ps
