# ══════════════════════════════════════════════════
# LinhIQ — Production Docker Compose
# ══════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
# ══════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: linhiq-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linhiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-linhiq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Bind localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linhiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: linhiq-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"  # Bind localhost only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM Proxy ──
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: linhiq-litellm
    restart: always
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-NamCao0603}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-javirs}:${POSTGRES_PASSWORD}@postgres:5432/litellm"
    volumes:
      - ./deploy/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: [ "--port", "4000", "--config", "/app/config.yaml" ]
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: linhiq-nginx
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (SSL auto-renew) ──
  certbot:
    image: certbot/certbot
    container_name: linhiq-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    # Renew every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  # ── API (NestJS) ──
  api:
    image: vietbn/linhiq-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: linhiq-api
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-linhiq}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-linhiq}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-CHANGE_ME_STRONG_REDIS_PASSWORD}@redis:6379"
    # Override CMD — use node directly (fix old image that used tsx)
    command: ["sh", "-c", "./node_modules/.bin/prisma migrate deploy --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/main.js"]
    ports:
      - "127.0.0.1:4500:4500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Web (Next.js) ──
  web:
    image: vietbn/linhiq-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.linhiq.com/api}
    container_name: linhiq-web
    restart: always
    env_file: .env.prod
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
