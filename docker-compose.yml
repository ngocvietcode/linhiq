services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: linhiq-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: linhiq
      POSTGRES_PASSWORD: linhiq_dev
      POSTGRES_DB: linhiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linhiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linhiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: linhiq-litellm
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234}
      # Pass API keys if needed
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: [ "--port", "4000" ]

volumes:
  pgdata:
  redisdata:
