services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: javirs-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: javirs
      POSTGRES_PASSWORD: javirs_dev
      POSTGRES_DB: javirs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U javirs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: javirs-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
