# ══════════════════════════════════════
# LinhIQ — Nginx Site Configuration
# Domain: linhiq.com | api.linhiq.com
# ══════════════════════════════════════

# Docker internal DNS resolver (required for variable-based proxy_pass)
resolver 127.0.0.11 valid=30s ipv6=off;

# ── Upstreams ──
upstream linhiq_web {
    server web:3000;
    keepalive 64;
}

upstream linhiq_litellm {
    server litellm:4000;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name linhiq.com api.linhiq.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Web Frontend (HTTPS) — linhiq.com → web:3000 ──
server {
    listen 443 ssl http2;
    server_name linhiq.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/linhiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linhiq.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Rate limit
    limit_req zone=web_limit burst=20 nodelay;

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        proxy_pass http://linhiq_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://linhiq_web;
    }

    # Public static files
    location /favicon.ico {
        proxy_pass http://linhiq_web;
        add_header Cache-Control "public, max-age=86400";
    }

    # All other requests → Next.js (web:3000)
    location / {
        proxy_pass http://linhiq_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

# ── API Backend (HTTPS) — api.linhiq.com → api:4500 ──
server {
    listen 443 ssl http2;
    server_name api.linhiq.com;

    ssl_certificate     /etc/letsencrypt/live/linhiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linhiq.com/privkey.pem;

    # ── CORS handled at nginx (helmet blocks NestJS from adding headers) ──
    set $cors_origin "";
    if ($http_origin = "https://linhiq.com")     { set $cors_origin $http_origin; }
    if ($http_origin = "http://localhost:3000")  { set $cors_origin $http_origin; }

    # Hide duplicate CORS headers coming from NestJS backend
    proxy_hide_header 'Access-Control-Allow-Origin';
    proxy_hide_header 'Access-Control-Allow-Credentials';
    proxy_hide_header 'Access-Control-Allow-Methods';
    proxy_hide_header 'Access-Control-Allow-Headers';

    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With' always;
    add_header 'Access-Control-Max-Age'           '86400' always;

    # Handle OPTIONS preflight directly — no need to proxy to NestJS
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size
    client_max_body_size 50M;

    # Use variable for proxy_pass so nginx doesn't fail if api is down
    set $api_upstream http://api:4500;

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiteLLM Proxy — /llm/* → litellm:4000
    location /llm/ {
        limit_req zone=api_limit burst=50 nodelay;

        rewrite ^/llm/(.*) /$1 break;

        proxy_pass http://linhiq_litellm;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_buffering off;
    }

    # General API — normal rate limit
    location / {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_buffering off;
    }
}
