# ══════════════════════════════════════
# Javirs — Nginx Site Configuration
# ══════════════════════════════════════
# Replace YOUR_DOMAIN with your actual domain

# ── Upstreams ──
upstream javirs_web {
    server web:3000;
    keepalive 64;
}

upstream javirs_api {
    server api:4500;
    keepalive 64;
}

upstream javirs_litellm {
    server litellm:4000;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name YOUR_DOMAIN api.YOUR_DOMAIN;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Web Frontend (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Rate limit
    limit_req zone=web_limit burst=20 nodelay;

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        proxy_pass http://javirs_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://javirs_web;
        proxy_cache_valid 200 60m;
    }

    # Public static files
    location /favicon.ico {
        proxy_pass http://javirs_web;
        proxy_cache_valid 200 30d;
    }

    # All other requests → Next.js
    location / {
        proxy_pass http://javirs_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;     # Important for streaming
    }
}

# ── API Backend (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name api.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size
    client_max_body_size 10M;

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://javirs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API — normal rate limit
    location / {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://javirs_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_buffering off;     # Important for AI streaming
    }

    # LiteLLM Proxy — route /llm/* to litellm container
    location /llm/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        # Rewrite /llm/v1/... to /v1/...
        rewrite ^/llm/(.*) /$1 break;

        proxy_pass http://javirs_litellm;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important timeouts for long AI generation
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_buffering off;
    }
}
